<!DOCTYPE html> <!-- Indica que el documento utiliza HTML5. -->

<html lang="es"> <!-- Elemento raíz del documento y establece que el idioma es español. -->

<head> <!-- Contiene la información de configuración de la página. -->

    <meta charset="UTF-8">
    <!-- Permite mostrar correctamente caracteres especiales como á, é, í, ó, ú y ñ. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea adaptable a dispositivos móviles. -->

    <title>Panel de Usuario - SRIB</title>
    <!-- Título que aparece en la pestaña del navegador. -->

    <link rel="stylesheet" href="../css/menuUsuario.css">
    <!-- Vincula el archivo CSS con los estilos de la página. -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Importa la biblioteca Font Awesome para utilizar iconos. -->

</head>

<body> <!-- Contiene todo el contenido visible de la página. -->

    <!-- ======================
            HEADER
    ====================== -->

    <header class="header">
    <!-- Encabezado principal del sistema. -->

        <h1>
        <!-- Título principal del sistema. -->

            SISTEMA DE REPORTE DE INCIDENCIAS

            <span>BUAP</span>
            <!-- Resalta la palabra BUAP con un estilo diferente. -->

        </h1>

        <a href="../index.html" class="btn-logout">
        <!-- Enlace para cerrar sesión y regresar a la página principal. -->

            <i class="fa-solid fa-right-from-bracket"></i>
            <!-- Icono de cerrar sesión obtenido de Font Awesome. -->

            Cerrar sesión

        </a>

    </header>

    <!-- ======================
       CONTENIDO PRINCIPAL
    ====================== -->

    <main class="dashboard">
    <!-- Contenedor principal del panel de usuario. -->

        <!-- ======================
              PERFIL
        ====================== -->

        <section class="profile">
        <!-- Sección que muestra la información del usuario. -->

            <img src="../img/perfil-default.png"
                alt="Foto de perfil"
                class="profile-img">
            <!-- Imagen de perfil predeterminada del usuario. -->

            <h2>Bienvenido a SRIB</h2>
            <!-- Mensaje de bienvenida. -->

            <p>
                Selecciona una opción para continuar.
            </p>
            <!-- Instrucción para que el usuario elija una acción. -->

        </section>

        <!-- ======================
              OPCIONES
        ====================== -->

        <section class="menu-panel">
        <!-- Panel que contiene las opciones disponibles para el usuario. -->

            <h2>¿Qué deseas realizar hoy?</h2>
            <!-- Título del panel de opciones. -->

            <div class="menu-buttons">
            <!-- Contenedor de los botones del menú. -->

                <a href="nuevoReporte.html" class="btn-option">
                <!-- Enlace para registrar una nueva incidencia. -->

                    <i class="fa-solid fa-file-circle-plus"></i>
                    <!-- Icono para representar un nuevo reporte. -->

                    Nuevo reporte

                </a>

                <a href="consultarReporte.html" class="btn-option">
                <!-- Enlace para consultar el estado de los reportes realizados. -->

                    <i class="fa-solid fa-magnifying-glass"></i>
                    <!-- Icono de búsqueda. -->

                    Consultar reportes

                </a>

            </div>

        </section>

    </main>

</body>

</html>
