<!DOCTYPE html> <!-- Indica que el documento utiliza HTML5. -->

<html lang="es"> <!-- Elemento raíz del documento y establece que el idioma es español. -->

<head> <!-- Contiene la información de configuración de la página. -->

    <meta charset="UTF-8">
    <!-- Permite mostrar correctamente caracteres especiales como á, é, í, ó, ú y ñ. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea adaptable a dispositivos móviles. -->

    <title>Nuevo Reporte - SRIB</title>
    <!-- Título que aparece en la pestaña del navegador. -->

    <link rel="stylesheet" href="../css/nuevoReporte.css">
    <!-- Vincula el archivo CSS con los estilos de la página. -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Importa la biblioteca Font Awesome para utilizar iconos. -->

</head>

<body> <!-- Contiene todo el contenido visible de la página. -->

    <!-- ======================
            HEADER
    ====================== -->

    <header class="header">
    <!-- Encabezado principal del sistema. -->

        <h1>
        <!-- Título principal del sistema. -->

            SISTEMA DE REPORTE DE INCIDENCIAS

            <span>BUAP</span>
            <!-- Resalta la palabra BUAP con un estilo diferente. -->

        </h1>

    </header>

    <!-- ======================
        BOTÓN REGRESAR
    ====================== -->

    <a href="menuUsuario.html" class="btn-back">
    <!-- Enlace para regresar al menú del usuario. -->

        <i class="fa-solid fa-arrow-left"></i>
        <!-- Icono de flecha obtenido de Font Awesome. -->

        Regresar al menú
        <!-- Texto del botón. -->

    </a>

    <!-- ======================
      CONTENIDO PRINCIPAL
    ====================== -->

    <main class="reporte-container">
    <!-- Contenedor principal del formulario. -->

        <div class="form-card">
        <!-- Tarjeta que contiene el formulario del reporte. -->

            <h2>
                Nuevo <span>reporte</span>
            </h2>
            <!-- Título del formulario. -->

            <div id="mensaje-error" class="mensaje-error">
                Debes completar todos los campos.
            </div>
            <!-- Contenedor donde se mostrarán los mensajes de error. -->

            <form id="formReporte">
            <!-- Formulario para registrar una nueva incidencia. -->

                <!-- ======================
                    DESCRIPCIÓN
                ====================== -->

                <div class="campo">
                <!-- Campo para escribir la descripción del problema. -->

                    <label>

                        <i class="fa-solid fa-file-lines"></i>
                        <!-- Icono de documento. -->

                        Descripción

                    </label>

                    <textarea
                        id="descripcion"
                        placeholder="Describe la incidencia encontrada..."></textarea>
                    <!-- Área donde el usuario describe la incidencia. -->

                </div>

                <!-- ======================
                    CATEGORÍA
                ====================== -->

                <div class="campo">
                <!-- Campo para seleccionar la categoría del reporte. -->

                    <label>

                        <i class="fa-solid fa-tags"></i>
                        <!-- Icono de etiquetas. -->

                        Categoría

                    </label>

                    <select id="categoria">
                    <!-- Lista desplegable de categorías. -->

                        <option value="">
                            Selecciona una categoría
                        </option>

                        <option>Equipos de cómputo</option>
                        <option>Internet</option>
                        <option>Proyectores</option>
                        <option>Mobiliario</option>
                        <option>Infraestructura</option>
                        <option>Otro</option>

                    </select>

                </div>

                <!-- ======================
                    UBICACIÓN
                ====================== -->

                <div class="campo">
                <!-- Campo para indicar dónde ocurrió la incidencia. -->

                    <label>

                        <i class="fa-solid fa-location-dot"></i>
                        <!-- Icono de ubicación. -->

                        Ubicación

                    </label>

                    <div class="ubicacion-container">
                    <!-- Contenedor del edificio y el detalle de la ubicación. -->

                        <select id="edificio">
                        <!-- Lista de edificios disponibles. -->

                            <option value="">
                                Selecciona edificio
                            </option>

                            <option>CC01</option>
                            <option>CC02</option>
                            <option>CC03</option>
                            <option>CC04</option>
                            <option>CC05</option>

                        </select>

                        <input
                            type="text"
                            id="detalleUbicacion"
                            placeholder="No. de salón, laboratorio, cubículo, etc.">
                        <!-- Campo para escribir el salón, laboratorio o cubículo. -->

                    </div>

                </div>

                <!-- ======================
                      FECHA
                ====================== -->

                <div class="campo">
                <!-- Campo para seleccionar la fecha de la incidencia. -->

                    <label>

                        <i class="fa-solid fa-calendar"></i>
                        <!-- Icono de calendario. -->

                        Fecha de registro

                    </label>

                    <input
                        type="date"
                        id="fecha"
                        required>
                    <!-- Campo para seleccionar la fecha del reporte. -->

                    <small class="fecha-info">
                        Solo se permiten incidencias ocurridas en los últimos 15 días.
                    </small>
                    <!-- Texto informativo sobre el rango permitido de fechas. -->

                </div>

                <!-- ======================
                     BOTÓN ENVIAR
                ====================== -->

                <button
                    type="submit"
                    class="btn-enviar">
                <!-- Botón para enviar el formulario. -->

                    <i class="fa-solid fa-paper-plane"></i>
                    <!-- Icono de envío. -->

                    Enviar reporte

                </button>

            </form>

        </div>

    </main>

    <!-- ======================
          JAVASCRIPT
    ====================== -->

    <script>

        // Obtiene el formulario del reporte.
        const formulario =
        document.getElementById("formReporte");

        // Obtiene el contenedor donde se mostrarán los mensajes de error.
        const mensaje =
        document.getElementById("mensaje-error");

        /* ======================
            FECHA: ÚLTIMOS 15 DÍAS
        ====================== */

        // Obtiene el campo de fecha.
        const fechaInput =
        document.getElementById("fecha");

        // Obtiene la fecha actual.
        const hoy = new Date();

        // Convierte la fecha actual al formato YYYY-MM-DD.
        const fechaMax =
        hoy.toISOString().split("T")[0];

        // Crea una nueva fecha basada en la fecha actual.
        const fechaMin = new Date();

        // Resta 15 días para obtener la fecha mínima permitida.
        fechaMin.setDate(
            fechaMin.getDate() - 15
        );

        // Convierte la fecha mínima al formato YYYY-MM-DD.
        const fechaMinima =
        fechaMin.toISOString().split("T")[0];

        // Establece la fecha máxima permitida.
        fechaInput.max = fechaMax;

        // Establece la fecha mínima permitida.
        fechaInput.min = fechaMinima;

        /* ======================
              VALIDACIÓN
        ====================== */

        // Agrega un evento que se ejecuta cuando el usuario envía el formulario.
        formulario.addEventListener("submit", function(e){

            // Evita que el formulario recargue la página.
            e.preventDefault();

            // Obtiene la descripción eliminando espacios innecesarios.
            const descripcion =
            document.getElementById("descripcion")
            .value.trim();

            // Obtiene la categoría seleccionada.
            const categoria =
            document.getElementById("categoria")
            .value;

            // Obtiene el edificio seleccionado.
            const edificio =
            document.getElementById("edificio")
            .value;

            // Obtiene el detalle de la ubicación eliminando espacios.
            const detalleUbicacion =
            document.getElementById("detalleUbicacion")
            .value.trim();

            // Obtiene la fecha seleccionada.
            const fecha =
            document.getElementById("fecha")
            .value;

            // Verifica que todos los campos estén completos.
            if(
                descripcion === "" ||
                categoria === "" ||
                edificio === "" ||
                detalleUbicacion === "" ||
                fecha === ""
            ){

                // Muestra el mensaje de error.
                mensaje.style.display = "block";

                // Cambia el texto del mensaje.
                mensaje.textContent =
                "Debes completar todos los campos.";

                // Finaliza la ejecución de la función.
                return;
            }

            // Oculta el mensaje de error cuando todo es válido.
            mensaje.style.display = "none";

            // Muestra un mensaje indicando que el reporte fue enviado correctamente.
            alert("Reporte enviado correctamente.");

        });

    </script>

</body>

</html>
