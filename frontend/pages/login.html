<!DOCTYPE html> <!-- Indica que el documento utiliza HTML5. -->

<html lang="es"> <!-- Elemento raíz del documento y establece que el idioma es español. -->

<head> <!-- Contiene la información de configuración de la página. -->

    <meta charset="UTF-8">
    <!-- Permite mostrar correctamente caracteres especiales como á, é, í, ó, ú y ñ. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea adaptable a dispositivos móviles. -->

    <title>Iniciar Sesión - SRIB</title>
    <!-- Título que aparece en la pestaña del navegador. -->

    <link rel="stylesheet" href="../css/login.css">
    <!-- Vincula el archivo CSS con los estilos de la página. -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Importa la biblioteca Font Awesome para utilizar iconos. -->

</head>

<body> <!-- Contiene todo el contenido visible de la página. -->

    <!-- ======================
            HEADER
    ====================== -->

    <header class="header">
    <!-- Encabezado principal del sistema. -->

        <h1>
        <!-- Título principal del sistema. -->

            SISTEMA DE REPORTE DE INCIDENCIAS

            <span>BUAP</span>
            <!-- Resalta la palabra BUAP con un estilo diferente. -->

        </h1>

    </header>

    <!-- ======================
        BOTÓN REGRESAR
    ====================== -->

    <a href="index.html" class="btn-back">
    <!-- Enlace para regresar a la página principal. -->

        <i class="fa-solid fa-arrow-left"></i>
        <!-- Icono de flecha obtenido de Font Awesome. -->

        Regresar al menú
        <!-- Texto del botón. -->

    </a>

    <!-- ======================
      CONTENIDO PRINCIPAL
    ====================== -->

    <main class="login-container">
    <!-- Contenedor principal del inicio de sesión. -->

        <!-- PANEL IZQUIERDO -->

        <section class="left-panel">
        <!-- Panel con información del sistema. -->

            <img src="../img/logo-srib.png"
                 alt="Logo SRIB"
                 class="logo-srib">
            <!-- Logotipo del sistema SRIB. -->

            <h2>
                Tu participación es<br>
                muy importante
            </h2>
            <!-- Mensaje principal para el usuario. -->

            <p class="descripcion">
                Inicia sesión para consultar el estado de tus reportes
                y dar seguimiento a las incidencias registradas.
            </p>
            <!-- Descripción de la utilidad del sistema. -->

            <div class="linea"></div>
            <!-- Línea decorativa. -->

        </section>

        <!-- PANEL DERECHO -->

        <section class="right-panel">
        <!-- Panel que contiene el formulario de inicio de sesión. -->

            <div class="form-card">
            <!-- Tarjeta del formulario. -->

                <h2>
                    Iniciar <span>sesión</span>
                </h2>
                <!-- Título del formulario. -->

                <form id="formLogin">
                <!-- Formulario de inicio de sesión. -->

                    <div class="campo">
                    <!-- Campo del correo institucional. -->

                        <label id="lblCorreo" for="correo">
                        <!-- Etiqueta asociada al campo de correo. -->

                            <i class="fa-solid fa-envelope"></i>
                            <!-- Icono de correo. -->

                            Correo institucional

                        </label>

                        <input
                            type="email"
                            id="correo"
                            placeholder="ejemplo@alumno.buap.mx"
                            required
                            autocomplete="username">
                        <small class="correo-ayuda">
                            Utiliza tu correo institucional BUAP.
                        </small>
                        <!-- Texto de ayuda para el usuario. -->

                    </div>

                    <div class="campo">
                    <!-- Campo de contraseña. -->

                        <label id="lblPassword" for="password">

                            <i class="fa-solid fa-lock"></i>
                            <!-- Icono de candado. -->

                            Contraseña

                        </label>
                        <input
                            type="password"
                            id="password"
                            placeholder="Ingresa tu contraseña"
                            required
                            autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn-login">
                    <!-- Botón para enviar el formulario. -->

                        <i class="fa-solid fa-right-to-bracket"></i>
                        <!-- Icono de inicio de sesión. -->

                        INICIAR SESIÓN

                    </button>

                </form>

                <p class="register-link">
                <!-- Enlace para registrarse si aún no tiene cuenta. -->

                    ¿No tienes una cuenta?

                    <a href="registro.html">
                        Regístrate
                    </a>

                </p>

            </div>

        </section>

    </main>

   <!-- ======================
        JAVASCRIPT
====================== -->

<script src="../js/validaciones.js"></script>

<script>

    // Obtiene el formulario.
    const formulario = document.getElementById("formLogin");

    // Obtiene los campos del formulario.
    const correoInput = document.getElementById("correo");
    const passwordInput = document.getElementById("password");

    // Se ejecuta cuando el usuario envía el formulario.
    formulario.addEventListener("submit", function(e){

        // Evita que el formulario se envíe mientras se valida.
        e.preventDefault();

        // Verifica que el correo no esté vacío.
        if(!validarCampo(correoInput)){
            return;
        }

        // Verifica que el correo pertenezca a BUAP.
        if(!validarCorreoBUAP(correoInput)){
            return;
        }

        // Verifica que la contraseña no esté vacía.
        if(!validarCampo(passwordInput)){
            return;
        }

        // Si todo es correcto.
        alert("Inicio de sesión exitoso.");

        // Aquí posteriormente se conectará con el backend.
        // formulario.submit();

    });

</script>

</body>

</html>
